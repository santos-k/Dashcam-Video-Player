name: dashcam_player
description: Dual dashcam video player with sync controls
publish_to: 'none'
version: 2.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

 # Video playback (Windows/Android/iOS compatible)
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # File picking
  file_picker: ^6.1.1

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Path utilities
  path: ^1.9.0

  # Window management (fullscreen / maximize)
  window_manager: ^0.3.9

  # URL launching (map in browser)
  url_launcher: ^6.2.4

  # UI utilities
  wakelock_plus: ^1.2.1

  intl: ^0.19.0

  # Interactive OpenStreetMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
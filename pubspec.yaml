name: dashcam_player
description: Dual dashcam video player with sync controls
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

 # Video playback (Windows/Android/iOS compatible)
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # File picking & permissions
  file_picker: ^6.1.1
  permission_handler: ^11.3.0

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Video export / FFmpeg
  ffmpeg_kit_flutter_full_gpl: ^6.0.3

  # Path utilities
  path: ^1.9.0
  path_provider: ^2.1.2

  # UI utilities
  wakelock_plus: ^1.2.1
  share_plus: ^7.2.2

  intl: ^0.19.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
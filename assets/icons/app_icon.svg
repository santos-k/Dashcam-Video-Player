<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#0D0D0D"/>

  <!-- Subtle road lines at bottom -->
  <rect x="472" y="820" width="36" height="90" rx="8" fill="#4FC3F7" opacity="0.25"/>
  <rect x="472" y="930" width="36" height="60" rx="8" fill="#4FC3F7" opacity="0.12"/>

  <!-- Main camera housing -->
  <rect x="130" y="280" width="620" height="400" rx="48" fill="#151520"/>
  <rect x="130" y="280" width="620" height="400" rx="48" fill="none" stroke="#4FC3F7" stroke-width="7"/>

  <!-- Main lens outer rings -->
  <circle cx="440" cy="480" r="148" fill="#0A0A14"/>
  <circle cx="440" cy="480" r="132" fill="#0D0D1A"/>
  <circle cx="440" cy="480" r="112" fill="#111122"/>
  <circle cx="440" cy="480" r="88"  fill="#0A0A14"/>

  <!-- Lens color rings -->
  <circle cx="440" cy="480" r="138" fill="none" stroke="#4FC3F7" stroke-width="3" opacity="0.35"/>
  <circle cx="440" cy="480" r="118" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.2"/>

  <!-- Lens iris -->
  <circle cx="440" cy="480" r="65" fill="#1A1A3A"/>
  <circle cx="440" cy="480" r="48" fill="#4FC3F7" opacity="0.18"/>
  <circle cx="440" cy="480" r="32" fill="#4FC3F7" opacity="0.55"/>
  <circle cx="440" cy="480" r="18" fill="#4FC3F7"/>

  <!-- Lens shine -->
  <circle cx="420" cy="458" r="12" fill="white" opacity="0.38"/>
  <circle cx="456" cy="495" r="5"  fill="white" opacity="0.15"/>

  <!-- REC dot -->
  <circle cx="680" cy="316" r="26" fill="#FF2D2D" opacity="0.9"/>
  <circle cx="680" cy="316" r="16" fill="#FF6060"/>
  <circle cx="673" cy="309" r="5"  fill="white" opacity="0.4"/>

  <!-- Rear / secondary camera badge -->
  <rect x="690" y="380" width="178" height="128" rx="20" fill="#0F0F1E"/>
  <rect x="690" y="380" width="178" height="128" rx="20" fill="none" stroke="#4FC3F7" stroke-width="4" opacity="0.6"/>
  <circle cx="779" cy="444" r="38" fill="#0A0A14"/>
  <circle cx="779" cy="444" r="26" fill="#111122"/>
  <circle cx="779" cy="444" r="16" fill="#4FC3F7" opacity="0.7"/>
  <circle cx="779" cy="444" r="8"  fill="#4FC3F7"/>
  <circle cx="771" cy="436" r="4"  fill="white" opacity="0.35"/>

  <!-- Small label below camera housing -->
  <text x="440" y="742" font-family="Arial Black, sans-serif" font-size="52"
        font-weight="900" fill="#4FC3F7" text-anchor="middle" letter-spacing="6"
        opacity="0.85">DASHCAM</text>
  <text x="440" y="795" font-family="Arial, sans-serif" font-size="28"
        font-weight="400" fill="#4FC3F7" text-anchor="middle" letter-spacing="12"
        opacity="0.45">PLAYER</text>

  <!-- Play button at bottom -->
  <circle cx="512" cy="900" r="62" fill="#4FC3F7" opacity="0.1"/>
  <circle cx="512" cy="900" r="62" fill="none" stroke="#4FC3F7" stroke-width="3" opacity="0.3"/>
  <polygon points="496,872 496,928 550,900" fill="#4FC3F7" opacity="0.85"/>
</svg>
